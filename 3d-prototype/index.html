<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON DRIFT — Neo Arcadia Enhanced</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }

    #canvas-container { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }

    /* START SCREEN */
    #start-screen {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #050508 0%, #0a0a15 50%, #0d0515 100%);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 1000; cursor: pointer;
    }
    #start-screen.hidden { opacity: 0; pointer-events: none; transition: opacity 1s ease; }

    #start-screen::before {
      content: ''; position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.04; pointer-events: none;
    }

    #start-screen h1 {
      font-family: 'Arial Black', sans-serif; font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 900; letter-spacing: 0.4em; color: #00f0ff;
      text-shadow: 0 0 80px rgba(0,240,255,0.5), 0 0 120px rgba(0,240,255,0.2);
      margin-bottom: 10px; animation: titleGlow 3s ease-in-out infinite;
    }

    #start-screen .subtitle {
      font-size: 11px; letter-spacing: 0.6em; color: rgba(255,255,255,0.25);
      margin-bottom: 80px;
    }

    #start-screen .prompt {
      font-size: 12px; letter-spacing: 0.4em; color: #ff2d6b;
      text-shadow: 0 0 30px rgba(255,45,107,0.6);
      animation: pulse 2s ease-in-out infinite;
    }

    #start-screen .controls-info {
      position: absolute; bottom: 40px; display: flex; gap: 40px;
      font-size: 10px; letter-spacing: 0.2em; color: rgba(255,255,255,0.2);
    }
    #start-screen .controls-info span { color: #00f0ff; }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes titleGlow { 0%,100% { text-shadow: 0 0 80px rgba(0,240,255,0.5); } 50% { text-shadow: 0 0 120px rgba(0,240,255,0.8), 0 0 200px rgba(0,240,255,0.3); } }

    /* HUD */
    #hud {
      position: fixed; bottom: 30px; left: 30px; z-index: 100;
      color: #00f0ff; font-size: 11px; letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(0,240,255,0.5); opacity: 0; transition: opacity 0.5s;
    }
    #hud.visible { opacity: 1; }
    #hud .label { color: rgba(255,255,255,0.3); font-size: 9px; margin-bottom: 2px; }
    #hud .value { font-size: 14px; margin-bottom: 15px; }

    #coords {
      position: fixed; top: 30px; right: 30px; z-index: 100;
      color: rgba(255,255,255,0.3); font-size: 10px; letter-spacing: 1px;
      text-align: right; opacity: 0; transition: opacity 0.5s;
    }
    #coords.visible { opacity: 1; }

    #title-overlay {
      position: fixed; top: 30px; left: 30px; z-index: 100;
      opacity: 0; transition: opacity 0.5s;
    }
    #title-overlay.visible { opacity: 1; }
    #title-overlay h1 {
      font-family: 'Arial Black', sans-serif; font-size: 16px;
      letter-spacing: 8px; color: #00f0ff;
      text-shadow: 0 0 30px rgba(0,240,255,0.5);
    }
    #title-overlay p { font-size: 9px; letter-spacing: 3px; color: rgba(255,255,255,0.3); margin-top: 5px; }

    #crosshair {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 20px; height: 20px; pointer-events: none; z-index: 100;
      opacity: 0; transition: opacity 0.5s;
    }
    #crosshair.visible { opacity: 0.6; }
    #crosshair::before, #crosshair::after { content: ''; position: absolute; background: #00f0ff; box-shadow: 0 0 10px #00f0ff; }
    #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }

    /* AUDIO INDICATOR */
    #audio-indicator {
      position: fixed; bottom: 30px; right: 30px; z-index: 100;
      color: rgba(255,255,255,0.3); font-size: 10px; letter-spacing: 2px;
      display: flex; align-items: center; gap: 8px;
      opacity: 0; transition: opacity 0.5s;
    }
    #audio-indicator.visible { opacity: 1; }
    #audio-indicator .bars { display: flex; gap: 2px; height: 12px; align-items: flex-end; }
    #audio-indicator .bar { width: 3px; background: #00f0ff; animation: audioBar 0.5s ease-in-out infinite; }
    #audio-indicator .bar:nth-child(1) { height: 4px; animation-delay: 0s; }
    #audio-indicator .bar:nth-child(2) { height: 8px; animation-delay: 0.1s; }
    #audio-indicator .bar:nth-child(3) { height: 6px; animation-delay: 0.2s; }
    #audio-indicator .bar:nth-child(4) { height: 10px; animation-delay: 0.3s; }
    @keyframes audioBar { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(0.4); } }

    /* WEATHER OVERLAY */
    #weather-overlay {
      position: fixed; inset: 0; z-index: 50; pointer-events: none;
      background: linear-gradient(to bottom, transparent 60%, rgba(0,10,20,0.3) 100%);
    }

    /* VIGNETTE */
    #vignette {
      position: fixed; inset: 0; z-index: 49; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.6) 100%);
    }

    /* LIGHTNING FLASH */
    #lightning {
      position: fixed; inset: 0; z-index: 48; pointer-events: none;
      background: rgba(150,180,255,0.15); opacity: 0; transition: opacity 0.05s;
    }
    #lightning.flash { opacity: 1; }

    /* FLOW STATE BAR */
    #flow-bar {
      position: fixed; bottom: 200px; left: 30px; z-index: 100;
      width: 150px; height: 4px; background: rgba(255,255,255,0.1);
      opacity: 0; transition: opacity 0.5s;
    }
    #flow-bar.visible { opacity: 1; }
    #flow-fill {
      height: 100%; width: 0%; background: linear-gradient(90deg, #00f0ff, #ff2d6b);
      transition: width 0.2s ease;
      box-shadow: 0 0 10px rgba(0,240,255,0.5);
    }
  </style>
</head>
<body>

  <!-- START SCREEN -->
  <div id="start-screen">
    <h1>NEON DRIFT</h1>
    <p class="subtitle">NEO ARCADIA — ENHANCED PROTOTYPE</p>
    <p class="prompt">[ CLICK TO ENTER THE SUMP ]</p>
    <div class="controls-info">
      <div><span>WASD</span> MOVE</div>
      <div><span>MOUSE</span> LOOK</div>
      <div><span>SPACE</span> JUMP</div>
      <div><span>SHIFT</span> SPRINT</div>
      <div><span>F</span> FLY</div>
      <div><span>R</span> RAIN</div>
      <div><span>M</span> MUTE</div>
    </div>
  </div>

  <!-- OVERLAYS -->
  <div id="vignette"></div>
  <div id="weather-overlay"></div>
  <div id="lightning"></div>

  <!-- HUD -->
  <div id="title-overlay">
    <h1>NEON DRIFT</h1>
    <p>NEO ARCADIA — THE SUMP</p>
  </div>
  <div id="crosshair"></div>
  <div id="hud">
    <div class="label">VELOCITY</div>
    <div class="value" id="velocity">0.0</div>
    <div class="label">ALTITUDE</div>
    <div class="value" id="altitude">0.0</div>
    <div class="label">FLOW STATE</div>
    <div class="value" id="flow-state">0%</div>
    <div class="label">WEATHER</div>
    <div class="value" id="weather-status">RAIN</div>
  </div>
  <div id="coords">
    <div>X: <span id="coord-x">0.00</span></div>
    <div>Y: <span id="coord-y">0.00</span></div>
    <div>Z: <span id="coord-z">0.00</span></div>
  </div>
  <div id="audio-indicator">
    <div class="bars">
      <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>
    <span>AUDIO</span>
  </div>
  <div id="flow-bar"><div id="flow-fill"></div></div>

  <!-- CANVAS -->
  <div id="canvas-container"></div>

  <!-- THREE.JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ═══════════════════════════════════════════════════════════════════════
    // NEON DRIFT - NEO ARCADIA ENHANCED PROTOTYPE v2.0
    // Features: Rain, Lightning, Enhanced Lighting, Sound, HUD, Full Controls
    // ═══════════════════════════════════════════════════════════════════════

    // ─── AUDIO CONTEXT ─────────────────────────────────────────────────────
    let audioCtx = null;
    let isMuted = false;
    let rainOscillator = null;
    let rainGain = null;

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      
      // Create rain noise
      const bufferSize = 2 * audioCtx.sampleRate;
      const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const output = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1;
      }
      
      const whiteNoise = audioCtx.createBufferSource();
      whiteNoise.buffer = noiseBuffer;
      whiteNoise.loop = true;
      
      // Filter for rain sound
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = 400;
      
      rainGain = audioCtx.createGain();
      rainGain.gain.value = 0.08;
      
      whiteNoise.connect(filter);
      filter.connect(rainGain);
      rainGain.connect(audioCtx.destination);
      whiteNoise.start();
    }

    function toggleMute() {
      isMuted = !isMuted;
      if (rainGain) {
        rainGain.gain.value = isMuted ? 0 : 0.08;
      }
    }

    // ─── SCENE SETUP ───────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x03050a);
    scene.fog = new THREE.FogExp2(0x03050a, 0.006);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(0, 8, 50);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.8;
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // ─── COLORS ─────────────────────────────────────────────────────────────
    const NEON_CYAN = 0x00f0ff;
    const NEON_MAGENTA = 0xff2d6b;
    const NEON_YELLOW = 0xe8ff00;
    const NEON_PURPLE = 0x9944ff;
    const NEON_ORANGE = 0xff6622;
    const NEON_GREEN = 0x44ff88;
    const neonColors = [NEON_CYAN, NEON_MAGENTA, NEON_YELLOW, NEON_PURPLE, NEON_ORANGE, NEON_GREEN];

    // ─── LIGHTING ───────────────────────────────────────────────────────────
    const ambientLight = new THREE.AmbientLight(0x0a0a1a, 0.4);
    scene.add(ambientLight);

    const hemiLight = new THREE.HemisphereLight(0x1a1a2a, 0x0a0a0f, 0.3);
    scene.add(hemiLight);

    const moonLight = new THREE.DirectionalLight(0x4455aa, 0.15);
    moonLight.position.set(-50, 150, 50);
    moonLight.castShadow = true;
    moonLight.shadow.mapSize.width = 2048;
    moonLight.shadow.mapSize.height = 2048;
    moonLight.shadow.camera.near = 10;
    moonLight.shadow.camera.far = 400;
    moonLight.shadow.camera.left = -150;
    moonLight.shadow.camera.right = 150;
    moonLight.shadow.camera.top = 150;
    moonLight.shadow.camera.bottom = -150;
    scene.add(moonLight);

    // ─── GROUND (WET REFLECTION LOOK) ──────────────────────────────────────
    const groundGeometry = new THREE.PlaneGeometry(2000, 2000, 1, 1);
    const groundMaterial = new THREE.MeshStandardMaterial({
      color: 0x050810,
      roughness: 0.15,
      metalness: 0.9,
      envMapIntensity: 0.5
    });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // Grid
    const gridHelper = new THREE.GridHelper(2000, 200, 0x00f0ff, 0x050810);
    gridHelper.material.opacity = 0.08;
    gridHelper.material.transparent = true;
    scene.add(gridHelper);

    // ─── BUILDINGS ──────────────────────────────────────────────────────────
    const buildings = [];
    const buildingCount = 350;
    const cityRadius = 450;

    const buildingMaterials = [
      new THREE.MeshStandardMaterial({ color: 0x0a0a12, roughness: 0.6, metalness: 0.4 }),
      new THREE.MeshStandardMaterial({ color: 0x0d0d18, roughness: 0.5, metalness: 0.5 }),
      new THREE.MeshStandardMaterial({ color: 0x080810, roughness: 0.7, metalness: 0.3 }),
      new THREE.MeshStandardMaterial({ color: 0x10101a, roughness: 0.4, metalness: 0.6 }),
    ];

    // Store blinkers for animation
    const blinkers = [];

    function createBuilding(x, z) {
      const width = 8 + Math.random() * 28;
      const depth = 8 + Math.random() * 28;
      const distFromCenter = Math.sqrt(x*x + z*z);
      const height = 20 + Math.random() * 100 + distFromCenter * 0.2;

      // Main structure
      const geometry = new THREE.BoxGeometry(width, height, depth);
      const material = buildingMaterials[Math.floor(Math.random() * buildingMaterials.length)].clone();
      const building = new THREE.Mesh(geometry, material);
      building.position.set(x, height / 2, z);
      building.castShadow = true;
      building.receiveShadow = true;
      scene.add(building);
      buildings.push({ mesh: building, width, depth, height });

      // Neon accent strips
      const stripCount = 1 + Math.floor(Math.random() * 5);
      for (let i = 0; i < stripCount; i++) {
        const stripY = 5 + Math.random() * (height - 10);
        const stripColor = neonColors[Math.floor(Math.random() * neonColors.length)];
        const side = Math.floor(Math.random() * 4);

        let stripGeom, stripPos;
        if (side === 0 || side === 2) {
          stripGeom = new THREE.BoxGeometry(width + 0.3, 0.15, 0.15);
          stripPos = new THREE.Vector3(x, stripY, z + (side === 0 ? depth/2 + 0.1 : -depth/2 - 0.1));
        } else {
          stripGeom = new THREE.BoxGeometry(0.15, 0.15, depth + 0.3);
          stripPos = new THREE.Vector3(x + (side === 1 ? width/2 + 0.1 : -width/2 - 0.1), stripY, z);
        }

        const stripMat = new THREE.MeshBasicMaterial({ color: stripColor });
        const strip = new THREE.Mesh(stripGeom, stripMat);
        strip.position.copy(stripPos);
        scene.add(strip);

        // Glow light
        if (Math.random() > 0.6) {
          const glow = new THREE.PointLight(stripColor, 0.4, 20);
          glow.position.copy(stripPos);
          scene.add(glow);
        }
      }

      // Windows
      const windowRows = Math.floor(height / 7);
      const windowCols = Math.floor(width / 5);
      for (let row = 0; row < windowRows; row++) {
        for (let col = 0; col < windowCols; col++) {
          if (Math.random() > 0.55) {
            const on = Math.random() > 0.3;
            const windowColor = on ? (Math.random() > 0.7 ? neonColors[Math.floor(Math.random() * neonColors.length)] : 0xffeecc) : 0x111115;
            const windowOpacity = on ? (0.4 + Math.random() * 0.5) : 0.1;

            const wGeom = new THREE.PlaneGeometry(1.8, 2.5);
            const wMat = new THREE.MeshBasicMaterial({
              color: windowColor, transparent: true, opacity: windowOpacity
            });

            // Front
            const w1 = new THREE.Mesh(wGeom, wMat);
            w1.position.set(x - width/2 + 2.5 + col * 5, 4 + row * 7, z + depth/2 + 0.05);
            scene.add(w1);

            // Back
            const w2 = new THREE.Mesh(wGeom, wMat);
            w2.position.set(x - width/2 + 2.5 + col * 5, 4 + row * 7, z - depth/2 - 0.05);
            w2.rotation.y = Math.PI;
            scene.add(w2);

            // Side
            if (Math.random() > 0.5) {
              const w3 = new THREE.Mesh(wGeom.clone(), wMat.clone());
              w3.position.set(x + width/2 + 0.05, 4 + row * 7, z - depth/2 + 2.5 + col * 5);
              w3.rotation.y = Math.PI / 2;
              scene.add(w3);
            }
          }
        }
      }

      // Rooftop elements
      if (Math.random() > 0.4) {
        const antColor = neonColors[Math.floor(Math.random() * neonColors.length)];
        const antGeom = new THREE.CylinderGeometry(0.08, 0.08, 6 + Math.random() * 6, 6);
        const antMat = new THREE.MeshStandardMaterial({ color: 0x222233, metalness: 0.8, roughness: 0.3 });
        const antenna = new THREE.Mesh(antGeom, antMat);
        antenna.position.set(x, height + 4, z);
        scene.add(antenna);

        const lightGeom = new THREE.SphereGeometry(0.25, 8, 8);
        const lightMat = new THREE.MeshBasicMaterial({ color: antColor });
        const lightMesh = new THREE.Mesh(lightGeom, lightMat);
        lightMesh.position.set(x, height + 7.5, z);
        scene.add(lightMesh);

        const pLight = new THREE.PointLight(antColor, 0.6, 40);
        pLight.position.set(x, height + 7.5, z);
        scene.add(pLight);

        blinkers.push({
          mesh: lightMesh,
          light: pLight,
          blinkSpeed: 0.5 + Math.random() * 2,
          blinkOffset: Math.random() * Math.PI * 2,
          baseIntensity: 0.6
        });
      }

      // AC units, boxes on roof
      if (Math.random() > 0.5) {
        const boxCount = 1 + Math.floor(Math.random() * 3);
        for (let b = 0; b < boxCount; b++) {
          const bSize = 1 + Math.random() * 2;
          const bGeom = new THREE.BoxGeometry(bSize, bSize * 0.6, bSize);
          const bMat = new THREE.MeshStandardMaterial({ color: 0x15151f, metalness: 0.6, roughness: 0.4 });
          const box = new THREE.Mesh(bGeom, bMat);
          box.position.set(x + (Math.random()-0.5) * width * 0.6, height + bSize * 0.3, z + (Math.random()-0.5) * depth * 0.6);
          box.castShadow = true;
          scene.add(box);
        }
      }

      return building;
    }

    // Generate city
    for (let i = 0; i < buildingCount; i++) {
      const angle = Math.random() * Math.PI * 2;
      const radius = 25 + Math.random() * cityRadius;
      createBuilding(Math.cos(angle) * radius, Math.sin(angle) * radius);
    }

    // Central cluster
    for (let i = 0; i < 8; i++) {
      createBuilding((Math.random()-0.5) * 80, (Math.random()-0.5) * 80);
    }

    // ─── NEON SIGNS ────────────────────────────────────────────────────────
    for (let i = 0; i < 40; i++) {
      const angle = Math.random() * Math.PI * 2;
      const radius = 40 + Math.random() * 180;
      const x = Math.cos(angle) * radius;
      const z = Math.sin(angle) * radius;
      const y = 12 + Math.random() * 50;
      const color = neonColors[Math.floor(Math.random() * neonColors.length)];

      const signGeom = new THREE.PlaneGeometry(6 + Math.random() * 8, 2 + Math.random() * 3);
      const signMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.7, side: THREE.DoubleSide });
      const sign = new THREE.Mesh(signGeom, signMat);
      sign.position.set(x, y, z);
      sign.rotation.y = Math.random() * Math.PI * 2;
      sign.rotation.z = (Math.random() - 0.5) * 0.2;
      scene.add(sign);

      const signLight = new THREE.PointLight(color, 0.8, 30);
      signLight.position.set(x, y, z);
      scene.add(signLight);
    }

    // ─── RAINDROP SYSTEM ───────────────────────────────────────────────────
    let isRaining = true;
    const rainCount = 15000;
    const rainGeometry = new THREE.BufferGeometry();
    const rainPositions = new Float32Array(rainCount * 3);
    const rainVelocities = new Float32Array(rainCount);

    for (let i = 0; i < rainCount; i++) {
      rainPositions[i * 3] = (Math.random() - 0.5) * 600;
      rainPositions[i * 3 + 1] = Math.random() * 200;
      rainPositions[i * 3 + 2] = (Math.random() - 0.5) * 600;
      rainVelocities[i] = 0.8 + Math.random() * 0.5;
    }

    rainGeometry.setAttribute('position', new THREE.BufferAttribute(rainPositions, 3));

    const rainMaterial = new THREE.PointsMaterial({
      color: 0x8899bb,
      size: 0.15,
      transparent: true,
      opacity: 0.6,
      blending: THREE.AdditiveBlending
    });

    const rain = new THREE.Points(rainGeometry, rainMaterial);
    scene.add(rain);

    // ─── FOG PARTICLES ─────────────────────────────────────────────────────
    const fogParticleCount = 3000;
    const fogGeometry = new THREE.BufferGeometry();
    const fogPositions = new Float32Array(fogParticleCount * 3);

    for (let i = 0; i < fogParticleCount; i++) {
      fogPositions[i * 3] = (Math.random() - 0.5) * 500;
      fogPositions[i * 3 + 1] = Math.random() * 60;
      fogPositions[i * 3 + 2] = (Math.random() - 0.5) * 500;
    }

    fogGeometry.setAttribute('position', new THREE.BufferAttribute(fogPositions, 3));

    const fogMaterial = new THREE.PointsMaterial({
      color: 0x334455,
      size: 2,
      transparent: true,
      opacity: 0.15,
      blending: THREE.AdditiveBlending
    });

    const fogParticles = new THREE.Points(fogGeometry, fogMaterial);
    scene.add(fogParticles);

    // ─── FLOATING NEON PARTICLES ───────────────────────────────────────────
    const particleCount = 1500;
    const particleGeometry = new THREE.BufferGeometry();
    const particlePositions = new Float32Array(particleCount * 3);
    const particleColors = new Float32Array(particleCount * 3);

    for (let i = 0; i < particleCount; i++) {
      particlePositions[i * 3] = (Math.random() - 0.5) * 600;
      particlePositions[i * 3 + 1] = Math.random() * 150;
      particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 600;

      const color = new THREE.Color(neonColors[Math.floor(Math.random() * neonColors.length)]);
      particleColors[i * 3] = color.r;
      particleColors[i * 3 + 1] = color.g;
      particleColors[i * 3 + 2] = color.b;
    }

    particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    particleGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

    const particleMaterial = new THREE.PointsMaterial({
      size: 0.3,
      vertexColors: true,
      transparent: true,
      opacity: 0.7,
      blending: THREE.AdditiveBlending
    });

    const floatingParticles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(floatingParticles);

    // ─── PLAYER CONTROLLER ─────────────────────────────────────────────────
    const player = {
      position: new THREE.Vector3(0, 10, 50),
      velocity: new THREE.Vector3(0, 0, 0),
      rotation: new THREE.Euler(0, 0, 0, 'YXZ'),
      onGround: false,
      flyMode: false,
      height: 3,
      speed: 0.12,
      sprintSpeed: 0.22,
      jumpForce: 0.35,
      gravity: 0.012,
      flowState: 0,
      lastMoveTime: Date.now(),
      mouseX: 0,
      mouseY: 0
    };

    const keys = {
      forward: false,
      backward: false,
      left: false,
      right: false,
      jump: false,
      sprint: false
    };

    let isLocked = false;
    let lightningTimeout = null;

    // ─── INPUT HANDLING ─────────────────────────────────────────────────────
    document.getElementById('start-screen').addEventListener('click', () => {
      initAudio();
      renderer.domElement.requestPointerLock();
    });

    document.addEventListener('pointerlockchange', () => {
      isLocked = document.pointerLockElement === renderer.domElement;
      document.getElementById('start-screen').classList.toggle('hidden', isLocked);
      document.getElementById('hud').classList.toggle('visible', isLocked);
      document.getElementById('coords').classList.toggle('visible', isLocked);
      document.getElementById('title-overlay').classList.toggle('visible', isLocked);
      document.getElementById('crosshair').classList.toggle('visible', isLocked);
      document.getElementById('audio-indicator').classList.toggle('visible', isLocked);
      document.getElementById('flow-bar').classList.toggle('visible', isLocked);
    });

    document.addEventListener('mousemove', (e) => {
      if (!isLocked) return;
      player.rotation.y -= e.movementX * 0.002;
      player.rotation.x -= e.movementY * 0.002;
      player.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, player.rotation.x));
    });

    document.addEventListener('keydown', (e) => {
      switch(e.code) {
        case 'KeyW': keys.forward = true; break;
        case 'KeyS': keys.backward = true; break;
        case 'KeyA': keys.left = true; break;
        case 'KeyD': keys.right = true; break;
        case 'Space': keys.jump = true; e.preventDefault(); break;
        case 'ShiftLeft': keys.sprint = true; break;
        case 'KeyF': player.flyMode = !player.flyMode; break;
        case 'KeyR': toggleRain(); break;
        case 'KeyM': toggleMute(); break;
      }
    });

    document.addEventListener('keyup', (e) => {
      switch(e.code) {
        case 'KeyW': keys.forward = false; break;
        case 'KeyS': keys.backward = false; break;
        case 'KeyA': keys.left = false; break;
        case 'KeyD': keys.right = false; break;
        case 'Space': keys.jump = false; break;
        case 'ShiftLeft': keys.sprint = false; break;
      }
    });

    // ─── RAIN TOGGLE ───────────────────────────────────────────────────────
    function toggleRain() {
      isRaining = !isRaining;
      rain.visible = isRaining;
      document.getElementById('weather-status').textContent = isRaining ? 'RAIN' : 'CLEAR';
      if (rainGain) {
        rainGain.gain.value = isMuted ? 0 : (isRaining ? 0.08 : 0);
      }
    }

    // ─── COLLISION DETECTION ───────────────────────────────────────────────
    function checkBuildingCollision(pos) {
      const playerBox = new THREE.Box3(
        new THREE.Vector3(pos.x - 1, pos.y - player.height, pos.z - 1),
        new THREE.Vector3(pos.x + 1, pos.y + 2, pos.z + 1)
      );

      for (const b of buildings) {
        const buildingBox = new THREE.Box3().setFromObject(b.mesh);
        if (playerBox.intersectsBox(buildingBox)) {
          return b;
        }
      }
      return null;
    }

    // ─── UPDATE PLAYER ─────────────────────────────────────────────────────
    function updatePlayer() {
      if (!isLocked) return;

      const moveSpeed = keys.sprint ? player.sprintSpeed : player.speed;
      const forward = new THREE.Vector3(0, 0, -1);
      const right = new THREE.Vector3(1, 0, 0);

      // Apply yaw rotation
      forward.applyAxisAngle(new THREE.Vector3(0, 1, 0), player.rotation.y);
      right.applyAxisAngle(new THREE.Vector3(0, 1, 0), player.rotation.y);

      // Calculate movement direction
      const moveDir = new THREE.Vector3(0, 0, 0);
      if (keys.forward) moveDir.add(forward);
      if (keys.backward) moveDir.sub(forward);
      if (keys.right) moveDir.add(right);
      if (keys.left) moveDir.sub(right);

      const isMoving = moveDir.length() > 0;
      if (isMoving) moveDir.normalize();

      // Apply movement
      if (player.flyMode) {
        // Fly mode
        const flySpeed = moveSpeed * 2;
        if (isMoving) {
          player.position.x += moveDir.x * flySpeed;
          player.position.z += moveDir.z * flySpeed;
        }
        if (keys.jump) player.position.y += flySpeed;
        if (keys.sprint && !keys.jump) player.position.y -= flySpeed;
      } else {
        // Normal mode with gravity
        if (isMoving) {
          player.velocity.x = moveDir.x * moveSpeed;
          player.velocity.z = moveDir.z * moveSpeed;
        } else {
          player.velocity.x *= 0.85;
          player.velocity.z *= 0.85;
        }
        // Gravity
        player.velocity.y -= player.gravity;

        // Jump
        if (keys.jump && player.onGround) {
          player.velocity.y = player.jumpForce;
          player.onGround = false;
            }
      // Apply velocity
        player.position.x += player.velocity.x;
        player.position.z += player.velocity.z;
        player.position.y += player.velocity.y;

        // Ground collision
        if (player.position.y < 10) {
          player.position.y = 10;
          player.velocity.y = 0;
          player.onGround = true;
        }
      }

      // Building collision - simple push out
      const collision = checkBuildingCollision(player.position);
      if (collision) {
        // Push player away from building center
        const buildingPos = collision.mesh.position;
        const dx = player.position.x - buildingPos.x;
        const dz = player.position.z - buildingPos.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist > 0) {
          player.position.x += (dx / dist) * 0.5;
          player.position.z += (dz / dist) * 0.5;
        }
      }

      // Flow State
      if (isMoving) {
        player.flowState = Math.min(100, player.flowState + 0.5);
        player.lastMoveTime = Date.now();
      } else {
        const timeSinceMove = Date.now() - player.lastMoveTime;
        if (timeSinceMove > 500) {
          player.flowState = Math.max(0, player.flowState - 0.3);
        }
      }

      // Update camera
      camera.position.copy(player.position);
      camera.rotation.set(player.rotation.x, player.rotation.y, player.rotation.z, 'YXZ');
    }
// ─── UPDATE HUD ────────────────────────────────────────────────────────
    function updateHUD() {
      const vel = Math.sqrt(
        player.velocity.x * player.velocity.x +
        player.velocity.z * player.velocity.z
      ) * 100;

      document.getElementById('velocity').textContent = vel.toFixed(1);
      document.getElementById('altitude').textContent = player.position.y.toFixed(1);
      document.getElementById('flow-state').textContent = Math.floor(player.flowState) + '%';
      document.getElementById('flow-fill').style.width = player.flowState + '%';

      document.getElementById('coord-x').textContent = player.position.x.toFixed(2);
      document.getElementById('coord-y').textContent = player.position.y.toFixed(2);
      document.getElementById('coord-z').textContent = player.position.z.toFixed(2);
    }

    // ─── LIGHTNING SYSTEM ──────────────────────────────────────────────────
    function triggerLightning() {
      if (!isRaining) return;
      
      const lightning = document.getElementById('lightning');
      lightning.classList.add('flash');
      
      // Add bright flash light
      const flashLight = new THREE.PointLight(0xaaccff, 3, 500);
      flashLight.position.set(
        camera.position.x + (Math.random() - 0.5) * 100,
        camera.position.y + 50,
        camera.position.z + (Math.random() - 0.5) * 100
      );
      scene.add(flashLight);

      setTimeout(() => {
        lightning.classList.remove('flash');
        scene.remove(flashLight);
      }, 100);
    }

    // Random lightning
    setInterval(() => {
      if (isRaining && Math.random() > 0.7) {
        triggerLightning();
      }
    }, 5000);

    // ─── ANIMATION LOOP ────────────────────────────────────────────────────
    let time = 0;

    function animate() {
      requestAnimationFrame(animate);
      time += 0.01;

      // Update player
      updatePlayer();
      updateHUD();

      // Animate rain
      if (isRaining) {
        const positions = rain.geometry.attributes.position.array;
        for (let i = 0; i < rainCount; i++) {
          positions[i * 3 + 1] -= rainVelocities[i];
          if (positions[i * 3 + 1] < 0) {
            positions[i * 3 + 1] = 200;
            positions[i * 3] = player.position.x + (Math.random() - 0.5) * 400;
            positions[i * 3 + 2] = player.position.z + (Math.random() - 0.5) * 400;
          }
        }
        rain.geometry.attributes.position.needsUpdate = true;
      }

      // Animate blinkers
      for (const blinker of blinkers) {
        const blink = Math.sin(time * blinker.blinkSpeed + blinker.blinkOffset);
        const intensity = blinker.baseIntensity * (blink > 0.3 ? 1 : 0.1);
        blinker.light.intensity = intensity;
        blinker.mesh.material.opacity = blink > 0.3 ? 1 : 0.2;
      }

      // Animate floating particles (subtle drift)
      const pPositions = floatingParticles.geometry.attributes.position.array;
      for (let i = 0; i < particleCount; i++) {
        pPositions[i * 3 + 1] += Math.sin(time + i * 0.1) * 0.02;
      }
      floatingParticles.geometry.attributes.position.needsUpdate = true;

      // Animate fog
      fogParticles.position.x = Math.sin(time * 0.1) * 10;
      fogParticles.position.z = Math.cos(time * 0.1) * 10;

      renderer.render(scene, camera);
    }

    // ─── WINDOW RESIZE ─────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ─── START ─────────────────────────────────────────────────────────────
    animate();
    document.getElementById('loading').textContent = 'READY';
    document.getElementById('loading').style.color = 'rgba(0, 240, 255, 0.4)';

  </script>
</body>
</html>
